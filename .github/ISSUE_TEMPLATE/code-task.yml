name: 코드 작업 등록
description: 코드 추가·수정 작업의 목적과 공개 전 점검 사항을 정리합니다.
title: "[Code] "
labels: ["code"]
body:
  - type: input
    id: author
    attributes:
      label: 작성자
      placeholder: "예: 김동혁"
    validations:
      required: true
  - type: input
    id: target_file
    attributes:
      label: 대상 파일
      placeholder: "예: src/pipelines/video_inference.py"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 코드 설명
      description: 코드 목적과 주요 모델/처리 흐름을 간단히 적습니다.
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: 공개 전 점검
      value: |
        - [ ] 데이터·이미지·영상이 포함되지 않았습니다.
        - [ ] 모델 가중치와 생성 결과가 포함되지 않았습니다.
        - [ ] API 키·토큰·개인 경로가 포함되지 않았습니다.
        - [ ] 코드 머리말에 요약과 작성자를 기록했습니다.
