name: 코드 타임라인 등록
description: 노션 완료 항목의 코드를 순서대로 정리합니다.
title: "[Code] "
labels: ["code", "timeline"]
body:
  - type: input
    id: order
    attributes:
      label: 노션 완료 순서
      placeholder: "예: 01"
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: 원작성자(노션)
      placeholder: "예: 김동혁"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 코드 설명
      description: 코드 목적과 주요 모델/처리 흐름을 간단히 적습니다.
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: 공개 전 점검
      value: |
        - [ ] 데이터·이미지·영상이 포함되지 않았습니다.
        - [ ] 모델 가중치와 생성 결과가 포함되지 않았습니다.
        - [ ] API 키·토큰·개인 경로가 포함되지 않았습니다.
        - [ ] 코드 머리말에 요약과 원작성자를 기록했습니다.

